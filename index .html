const getChapter = id => CHAPTERS.find(c => c.id === id);
const realToday  = () => new Date();
const formatDate = d => {
  if (!d) return "";
  const dt = typeof d === "string" ? new Date(d) : d;
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${"日月火水木金土"[dt.getDay()]}）`;
};
const getWeekDates = (base, offset = 0) => {
  const d = new Date(base);
  d.setDate(d.getDate() - d.getDay() + offset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(d); x.setDate(d.getDate() + i); return x;
  });
};
const isSameDay = (a, b) =>
  a.getFullYear() === b.getFullYear() &&
  a.getMonth()    === b.getMonth()    &&
  a.getDate()     === b.getDate();

const loadLS = (key, fallback) => {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
};
const saveLS = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

// ── 講師ごとのタスク自動生成（フォーム回答に基づく）──────────────
function buildSpeakerTasks(sp) {
  const tasks = [];
  const add = (id, label, category) => tasks.push({ id, label, category });

  // 依頼・確認フェーズ（常に表示）
  add("req_sent",    "依頼メール送信",           "依頼");
  add("form_sent",   "確認フォームURL送付",       "依頼");
  add("form_recvd",  "フォーム回答受領",          "依頼");
  add("doc_sent",    "確認書送付",               "依頼");

  // 宿泊関連（前泊あり の場合）
  if (sp.lodging && sp.lodging !== "不要" && sp.lodging !== "なし") {
    add("hotel_rsrv", "ホテル予約完了",           "宿泊");
    add("hotel_conf", "ホテル確認連絡（講師へ）",  "宿泊");
    add("pickup_plan","お迎え手配",               "宿泊");
  }

  // 資料関連
  add("material_chk","資料・写真受領確認",         "資料");
  if (sp.printRequired && sp.printRequired !== "不要") {
    add("print_done", "資料印刷完了",             "資料");
  }

  // 当日準備
  add("venue_ready", "会場準備・当日連絡",         "当日");
  add("intro_prep",  "紹介文・プロフィール確認",   "当日");

  // 講話後
  add("thanks_sent", "お礼メール送信",            "講話後");
  add("receipt_sent","領収書・謝礼送付",           "講話後");
  add("report_done", "講話レポート・メモ記録",     "講話後");

  return tasks;
}

          <div style={hdr.chBadges}>
            {CHAPTERS.map(ch => (
              <span key={ch.id} style={{ ...hdr.badge, background: ch.color }}>
                {ch.short}｜{ch.dayName}
              </span>
            ))}
          </div>
        </div>
        <nav style={hdr.nav}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ ...hdr.navBtn, ...(tab === t.id ? hdr.navOn : {}) }}>
              <span>{t.icon}</span> {t.label}
              {!!t.badge && t.badge > 0 && <span style={hdr.navBadge}>{t.badge}</span>}
            </button>
          ))}
        </nav>
      </header>

      <main style={{ padding:"16px 20px", maxWidth:1200, margin:"0 auto" }}>
        {tab === "dashboard" && <Dashboard speakers={speakers} tasks={tasks} weekDates={weekDates} today={today} onView={sp => { setDocSpeaker(sp); setTab("document"); }} setTab={setTab} />}
        {tab === "calendar"  && <CalendarView speakers={speakers} weekDates={weekDates} weekOffset={weekOffset} setWeekOffset={setWeekOffset} today={today} onSpeaker={sp => { setDocSpeaker(sp); setTab("document"); }} />}
        {tab === "speakers"  && <SpeakersView speakers={speakers} filterCh={filterCh} filterSt={filterSt} setFilterCh={setFilterCh} setFilterSt={setFilterSt} today={today} onEdit={sp => { setEditSpeaker(sp); setShowForm(true); }} onDelete={deleteSpeaker} onStatusChange={(id, st) => { updateSpeaker(id, { status: st }); showToast("更新しました ✓"); }} onDoc={sp => { setDocSpeaker(sp); setTab("document"); }} onLine={openLine} onToggleLine={toggleLine} onEmail={setEmailModal} onAdd={() => { setEditSpeaker(null); setShowForm(true); }} />}
        {tab === "document"  && <DocumentView speakers={speakers} docSpeaker={docSpeaker} setDocSpeaker={setDocSpeaker} today={today} />}
        {tab === "tasks"     && <TasksView tasks={tasks} today={today} newTask={newTask} setNewTask={setNewTask} onToggle={id => saveTasks(tasks.map(t => t.id === id ? { ...t, done: !t.done, completedAt: !t.done ? new Date().toISOString() : null } : t))} onDelete={id => saveTasks(tasks.filter(t => t.id !== id))} onAdd={() => { if (!newTask.title || !newTask.dueDate) return; saveTasks([...tasks, { ...newTask, id: `t${Date.now()}`, done: false }]); setNewTask({ title:"", chapterId:"kawaguchi", dueDate:"", priority:"medium" }); showToast("タスクを追加しました ✓"); }} />}
        {tab === "sptasks"   && <SpeakerTasksView speakers={speakers} today={today} updateSpeaker={updateSpeaker} showToast={showToast} />}
        {tab === "flyer"     && <FlyerView speakers={speakers} today={today} updateSpeaker={updateSpeaker} showToast={showToast} />}
        {tab === "ranking"   && <RankingView tasks={tasks} today={today} />}
      </main>

      {showForm && <SpeakerForm initial={editSpeaker} onSave={addOrUpdateSpeaker} onClose={() => { setShowForm(false); setEditSpeaker(null); }} />}
      {emailModal && <EmailModal speaker={emailModal} onClose={() => setEmailModal(null)} onDone={() => { setEmailModal(null); showToast("メール文をコピーしました 📧"); }} />}

      {lineModal && (
        <div style={OV} onClick={() => setLineModal(null)}>
          <div style={{ ...MOD, maxWidth:480 }} onClick={e => e.stopPropagation()}>
            <div style={MH}><span style={{ color:"#06C755", fontSize:20 }}>●</span> LINEグループ送信プレビュー</div>
            <pre style={{ background:"#E8F5E9", borderRadius:8, padding:12, fontSize:12, lineHeight:1.8, whiteSpace:"pre-wrap", border:"1px solid #A5D6A7", marginTop:10, maxHeight:260, overflowY:"auto" }}>{lineModal.msg}</pre>
            <div style={{ display:"flex", gap:8, marginTop:14 }}>
              <button style={BG} onClick={() => {
                navigator.clipboard?.writeText(lineModal.msg).catch(() => {});
                updateSpeaker(lineModal.speakerId, { lineNotified: true });
                setLineModal(null);
                showToast("コピーしました！LINEに貼り付けてください");
              }}>📋 コピーしてLINEへ</button>
              <button style={BC} onClick={() => setLineModal(null)}>閉じる</button>
            </div>
          </div>
        </div>
      )}

      {toast && <div style={{ position:"fixed", bottom:20, right:20, background:"#1B5E20", color:"#fff", padding:"10px 18px", borderRadius:8, fontSize:12, fontWeight:600, boxShadow:"0 4px 12px rgba(0,0,0,.3)", zIndex:2000 }}>{toast}</div>}
    </div>
  );
}

// ── 共通スタイル変数 ───────────────────────────────────────────────
const CARD = { background:"#fff", borderRadius:8, padding:"13px", boxShadow:"0 1px 4px rgba(0,0,0,.08)", marginBottom:12 };
const OV   = { position:"fixed", inset:0, background:"rgba(0,0,0,.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:16 };
const MOD  = { background:"#fff", borderRadius:10, padding:22, width:"100%", maxWidth:560, maxHeight:"90vh", overflowY:"auto" };
const MH   = { fontSize:14, fontWeight:700, color:"#1A3A6B", borderBottom:"2px solid #1A3A6B", paddingBottom:7, display:"flex", alignItems:"center", gap:7, marginBottom:8 };
const BP   = { background:"#1A3A6B", color:"#fff", border:"none", borderRadius:6, padding:"7px 15px", fontSize:12, fontWeight:700, cursor:"pointer" };
const BC   = { background:"#ECEFF1", color:"#546E7A", border:"none", borderRadius:6, padding:"7px 15px", fontSize:12, fontWeight:600, cursor:"pointer" };
const BG   = { background:"#06C755", color:"#fff", border:"none", borderRadius:6, padding:"7px 15px", fontSize:12, fontWeight:700, cursor:"pointer" };
const SEL  = { border:"1px solid #CFD8DC", borderRadius:6, padding:"5px 8px", fontSize:11, background:"#fff", cursor:"pointer" };
const INP  = { border:"1px solid #CFD8DC", borderRadius:6, padding:"6px 8px", fontSize:12, background:"#fff" };
const BSM  = { background:"#ECEFF1", border:"none", borderRadius:4, padding:"3px 8px", fontSize:11, cursor:"pointer", fontWeight:600 };
const TBL  = { width:"100%", borderCollapse:"collapse" };
const TH   = { padding:"8px 10px", fontSize:11, fontWeight:700, textAlign:"left", color:"#546E7A", background:"#ECEFF1" };
const TD   = { padding:"8px 10px", fontSize:11, verticalAlign:"middle", borderBottom:"1px solid #F5F5F5" };
const PILL = (ch) => ({ fontSize:11, padding:"2px 8px", borderRadius:12, fontWeight:700, background: ch.light, color: ch.color });

// ── ダッシュボード ────────────────────────────────────────────────
function Dashboard({ speakers, tasks, weekDates, today, onView, setTab }) {
  const thisWeek = speakers.filter(sp => weekDates.some(wd => isSameDay(wd, new Date(sp.seminarDate))));

  return (
    <div>
      <div style={{ fontSize:17, fontWeight:700, color:"#1A3A6B", marginBottom:13 }}>ダッシュボード</div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:14 }}>
        {[
          { label:"今週の開催",  val: thisWeek.length,                                     sub:"/5単会", color:"#1A3A6B" },
          { label:"依頼確定済",  val: speakers.filter(x => x.status === "confirmed").length, sub:"件",    color:"#1B5E20" },
          { label:"確認待ち",    val: speakers.filter(x => x.status === "pending").length,   sub:"件",    color:"#BF360C" },
          { label:"未完了タスク",val: tasks.filter(t => !t.done).length,                    sub:"件",    color:"#546E7A" },
        ].map((it, i) => (
          <div key={i} style={{ ...CARD, borderTop:`4px solid ${it.color}`, marginBottom:0 }}>
            <div style={{ fontSize:28, fontWeight:800, lineHeight:1, color: it.color }}>{it.val}<span style={{ fontSize:11, fontWeight:400, marginLeft:3 }}>{it.sub}</span></div>
            <div style={{ fontSize:11, color:"#78909C", marginTop:3 }}>{it.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:"#37474F", marginBottom:7 }}>今週のモーニングセミナー</div>
          <div style={CARD}>
            {CHAPTERS.map(ch => {
              const sp = thisWeek.find(x => x.chapterId === ch.id);
              return (
                <div key={ch.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:"1px solid #F5F5F5" }}>
                  <div style={{ color:"#fff", fontSize:10, padding:"2px 7px", borderRadius:12, fontWeight:700, background: ch.color, minWidth:26, textAlign:"center" }}>{ch.dayName.replace("曜日","")}</div>
                  <div style={{ fontWeight:700, fontSize:12, minWidth:70, color: ch.color }}>{ch.name}</div>
                  {sp ? (
                    <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap", flex:1 }}>
                      <span style={{ fontSize:12, fontWeight:600 }}>{sp.speakerName}</span>
                      <span style={{ fontSize:11, color:"#546E7A", background:"#ECEFF1", padding:"2px 7px", borderRadius:12 }}>「{sp.topic}」</span>
                      <span style={{ fontSize:11, padding:"2px 7px", borderRadius:12, fontWeight:600, color: STATUS[sp.status].color, background: STATUS[sp.status].bg }}>{STATUS[sp.status].label}</span>
                      <button style={BSM} onClick={() => onView(sp)}>確認書</button>
                    </div>
                  ) : <span style={{ color:"#9E9E9E", fontSize:11 }}>── 講師未設定</span>}
                </div>
              );
            })}
          </div>
        </div>

        <div>
          <div style={{ fontSize:13, fontWeight:700, color:"#37474F", marginBottom:7 }}>優先タスク（期限近い順）</div>
          <div style={CARD}>
            {tasks.filter(t => !t.done).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).slice(0, 5).map(t => {
              const ch = getChapter(t.chapterId);
              const dl = Math.ceil((new Date(t.dueDate) - today) / 86400000);
              return (
                <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:"1px solid #F5F5F5" }}>
                  <span style={PILL(ch)}>{ch.name}</span>
                  <span style={{ flex:1, fontSize:12 }}>{t.title}</span>
                  <span style={{ fontSize:11, fontWeight:700, color: dl < 0 ? "#B71C1C" : dl <= 3 ? "#E65100" : "#546E7A" }}>{dl < 0 ? "超過" : `${dl}日`}</span>
                </div>
              );
            })}
            {tasks.filter(t => !t.done).length === 0 && <div style={{ color:"#90A4AE", fontSize:12, textAlign:"center", padding:12 }}>タスクなし ✓</div>}
            <button style={{ background:"transparent", border:"none", color:"#1565C0", fontSize:12, cursor:"pointer", padding:"7px 0 0", fontWeight:600, display:"block" }} onClick={() => setTab("tasks")}>全タスクを見る →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── カレンダー ────────────────────────────────────────────────────
function CalendarView({ speakers, weekDates, weekOffset, setWeekOffset, today, onSpeaker }) {
  const a = weekDates[1], b = weekDates[5];
  const label = `${a.getFullYear()}年${a.getMonth()+1}月${a.getDate()}日 〜 ${b.getMonth()+1}月${b.getDate()}日`;

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ fontSize:17, fontWeight:700, color:"#1A3A6B" }}>週間カレンダー</div>
        <div style={{ display:"flex", gap:8, marginLeft:"auto", alignItems:"center" }}>
          <button style={{ background:"#ECEFF1", border:"none", borderRadius:6, padding:"5px 11px", fontSize:12, cursor:"pointer", fontWeight:600, color:"#37474F" }} onClick={() => setWeekOffset(o => o - 1)}>‹ 前週</button>
          <span style={{ fontSize:12, color:"#37474F", minWidth:210, textAlign:"center" }}>{label}</span>
          <button style={{ background:"#ECEFF1", border:"none", borderRadius:6, padding:"5px 11px", fontSize:12, cursor:"pointer", fontWeight:600, color:"#37474F" }} onClick={() => setWeekOffset(o => o + 1)}>次週 ›</button>
          <button style={{ background:"#1A3A6B", color:"#fff", border:"none", borderRadius:6, padding:"5px 11px", fontSize:12, cursor:"pointer", fontWeight:600 }} onClick={() => setWeekOffset(0)}>今週</button>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"96px repeat(7,1fr)", gap:1, background:"#CFD8DC", borderRadius:8, overflow:"hidden" }}>
        <div style={{ background:"#fff", padding:"6px 3px", textAlign:"center", fontSize:11, fontWeight:700 }}></div>
        {weekDates.map((d, i) => {
          const isT = isSameDay(d, today);
          return (
            <div key={i} style={{ background: isT ? "#1A3A6B" : "#fff", color: isT ? "#fff" : "#37474F", padding:"6px 3px", textAlign:"center", fontSize:11, fontWeight:700 }}>
              <div style={{ fontSize:9, opacity:.7 }}>{"日月火水木金土"[d.getDay()]}曜</div>
              <div style={{ fontSize:16, fontWeight:700 }}>{d.getDate()}</div>
            </div>
          );
        })}
        {CHAPTERS.map(ch => (
          <React.Fragment key={ch.id}>
            <div style={{ background:"#FAFAFA", padding:"6px 8px", display:"flex", flexDirection:"column", justifyContent:"center", gap:1, borderLeft:`3px solid ${ch.color}` }}>
              <span style={{ color: ch.color, fontWeight:700, fontSize:11 }}>{ch.name}</span>
              <span style={{ fontSize:9, color:"#90A4AE" }}>{ch.dayName}</span>
            </div>
            {weekDates.map((d, i) => {
              const isChDay = d.getDay() === ch.day;
              const sp = isChDay ? speakers.find(x => x.chapterId === ch.id && isSameDay(new Date(x.seminarDate), d)) : null;
              return (
                <div key={i} style={{ background: isChDay ? ch.light : "#fff", padding:4, minHeight:76, border:`1px solid ${isChDay ? ch.accent : "transparent"}` }}>
                  {isChDay && (sp ? (
                    <div style={{ cursor:"pointer", padding:"3px 4px", borderRadius:4 }} onClick={() => onSpeaker(sp)}>
                      <div style={{ fontSize:10, fontWeight:700, color: ch.color }}>{sp.speakerName}</div>
                      <div style={{ fontSize:9, color:"#546E7A", marginTop:1 }}>「{sp.topic}」</div>
                      <span style={{ fontSize:8, padding:"2px 6px", borderRadius:12, fontWeight:600, color: STATUS[sp.status].color, background: STATUS[sp.status].bg }}>{STATUS[sp.status].label}</span>
                    </div>
                  ) : (
                    <div style={{ textAlign:"center", paddingTop:16 }}>
                      <div style={{ fontSize:9, color: ch.accent }}>MS開催</div>
                      <div style={{ fontSize:8, color:"#B0BEC5" }}>講師未定</div>
                    </div>
                  ))}
                </div>
              );
            })}
          </React.Fragment>
        ))}
      </div>
      <div style={{ marginTop:10, padding:"7px 12px", background:"#F5F5F5", borderRadius:6, fontSize:11, color:"#78909C" }}>
        💡 セルをクリックで確認書を表示　｜　MS = モーニングセミナー（毎週午前6時〜7時）
      </div>
    </div>
  );
}

// ── 講師管理 ──────────────────────────────────────────────────────
function SpeakersView({ speakers, filterCh, filterSt, setFilterCh, setFilterSt, today, onEdit, onDelete, onStatusChange, onDoc, onLine, onToggleLine, onEmail, onAdd }) {
  const filtered = [...speakers]
    .filter(sp => (filterCh === "all" || sp.chapterId === filterCh) && (filterSt === "all" || sp.status === filterSt))
    .sort((a, b) => new Date(a.seminarDate) - new Date(b.seminarDate));

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ fontSize:17, fontWeight:700, color:"#1A3A6B" }}>講師管理</div>
        <div style={{ display:"flex", gap:8, marginLeft:"auto", flexWrap:"wrap" }}>
          <select style={SEL} value={filterCh} onChange={e => setFilterCh(e.target.value)}>
            <option value="all">全単会</option>
            {CHAPTERS.map(ch => <option key={ch.id} value={ch.id}>{ch.name}</option>)}
          </select>
          <select style={SEL} value={filterSt} onChange={e => setFilterSt(e.target.value)}>
            <option value="all">全ステータス</option>
            {Object.entries(STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
          </select>
          <button style={BP} onClick={onAdd}>＋ 新規登録</button>
        </div>
      </div>

      <div style={CARD}>
        <div style={{ overflowX:"auto" }}>
          <table style={TBL}>
            <thead>
              <tr>{["開催日","単会","講師名・所属","テーマ","ステータス","講話資料","依頼メール","LINE","操作"].map(h => <th key={h} style={TH}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {filtered.map(sp => {
                const ch = getChapter(sp.chapterId);
                return (
                  <tr key={sp.id} className="hover-row">
                    <td style={TD}><div style={{ fontWeight:600, fontSize:12 }}>{sp.seminarDate}</div><div style={{ fontSize:10, color:"#90A4AE" }}>{ch.dayName}</div></td>
                    <td style={TD}><span style={PILL(ch)}>{ch.name}</span></td>
                    <td style={TD}><div style={{ fontWeight:600, fontSize:12 }}>{sp.speakerName}</div><div style={{ fontSize:10, color:"#78909C" }}>{sp.company}　{sp.role}</div></td>
                    <td style={{ ...TD, maxWidth:150, fontSize:11 }}>「{sp.topic}」</td>
                    <td style={TD}>
                      <select style={{ ...SEL, fontSize:11, color: STATUS[sp.status].color }} value={sp.status} onChange={e => onStatusChange(sp.id, e.target.value)}>
                        {Object.entries(STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </td>
                    <td style={TD}>
                      {sp.materialUrl ? (
                        <a href={sp.materialUrl} target="_blank" style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, color:"#1565C0", fontWeight:600, textDecoration:"none" }}>
                          <span style={{ fontSize:13 }}>📄</span>
                          <span style={{ maxWidth:80, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{sp.materialName || "資料を開く"}</span>
                        </a>
                      ) : (
                        <span style={{ fontSize:10, color:"#B0BEC5", display:"flex", alignItems:"center", gap:3 }}>
                          <span>📭</span> 未受信
                        </span>
                      )}
                    </td>
                    <td style={TD}>
                      <button style={{ ...BSM, background:"#1A3A6B", color:"#fff", fontSize:10 }} onClick={() => onEmail(sp)}>📧 送信</button>
                    </td>
                    <td style={TD}>
                      {sp.lineNotified ? (
                        <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                          <span style={{ color:"#06C755", fontSize:11, fontWeight:600 }}>● 送信済</span>
                          <button style={{ ...BSM, fontSize:10, color:"#78909C" }} onClick={() => onToggleLine(sp)}>↩</button>
                        </div>
                      ) : (
                        <div style={{ display:"flex", gap:3 }}>
                          <button style={{ ...BSM, background:"#E8F5E9", color:"#2E7D32", border:"1px solid #A5D6A7", fontSize:10 }} onClick={() => onLine(sp)}>📤 送信</button>
                          <button style={{ ...BSM, fontSize:10, color:"#06C755" }} onClick={() => onToggleLine(sp)}>✓済</button>
                        </div>
                      )}
                    </td>
                    <td style={TD}>
                      <div style={{ display:"flex", gap:3 }}>
                        <button style={BSM} onClick={() => onDoc(sp)}>確認書</button>
                        <button style={BSM} onClick={() => onEdit(sp)}>編集</button>
                        <button style={{ ...BSM, color:"#B71C1C" }} onClick={() => onDelete(sp.id)}>削除</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
              {filtered.length === 0 && <tr><td colSpan={9} style={{ ...TD, textAlign:"center", color:"#90A4AE", padding:28 }}>該当データなし</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
      <div style={{ marginTop:10, padding:"10px 14px", background:"#E8F5E9", borderRadius:6, fontSize:11, color:"#2E7D32", display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ fontSize:16 }}>🤖</span>
        <div>
          <span style={{ fontWeight:700 }}>講話資料の自動格納について（準備中）</span>
          <span style={{ color:"#546E7A", marginLeft:8 }}>講師からのメール添付ファイルを <strong>nanbugoudou.jimu@gmail.com</strong> で受信すると、Googleドライブに自動保存され、この列にリンクが表示されます。</span>
        </div>
      </div>
    </div>
  );
}

}

// ── タスク管理 ────────────────────────────────────────────────────
function TasksView({ tasks, today, newTask, setNewTask, onToggle, onDelete, onAdd }) {
  const [showDone, setShowDone] = useState(false);
  const visible = tasks.filter(t => showDone || !t.done).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
  const PRIO = { high:{ label:"高", bg:"#FFEBEE", color:"#C62828" }, medium:{ label:"中", bg:"#FFF8E1", color:"#F57F17" }, low:{ label:"低", bg:"#E8F5E9", color:"#2E7D32" } };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
        <div style={{ fontSize:17, fontWeight:700, color:"#1A3A6B" }}>タスク管理</div>
        <button style={{ background:"#ECEFF1", border:"none", borderRadius:6, padding:"5px 11px", fontSize:11, cursor:"pointer", fontWeight:600, color:"#37474F", marginLeft:"auto" }} onClick={() => setShowDone(v => !v)}>
          {showDone ? "完了を隠す" : "完了済も表示"}
        </button>
      </div>

      <div style={{ ...CARD, marginBottom:12 }}>
        <div style={{ fontSize:11, fontWeight:700, color:"#546E7A", marginBottom:7 }}>＋ タスク追加</div>
        <div style={{ display:"flex", gap:7, flexWrap:"wrap", alignItems:"center" }}>
          <input style={{ ...INP, flex:3, minWidth:160 }} placeholder="タスク内容..." value={newTask.title} onChange={e => setNewTask({ ...newTask, title: e.target.value })} />
          <select style={SEL} value={newTask.chapterId} onChange={e => setNewTask({ ...newTask, chapterId: e.target.value })}>
            {CHAPTERS.map(ch => <option key={ch.id} value={ch.id}>{ch.name}</option>)}
          </select>
          <input type="date" style={INP} value={newTask.dueDate} onChange={e => setNewTask({ ...newTask, dueDate: e.target.value })} />
          <select style={SEL} value={newTask.priority} onChange={e => setNewTask({ ...newTask, priority: e.target.value })}>
            <option value="high">🔴 高</option>
            <option value="medium">🟡 中</option>
            <option value="low">🟢 低</option>
          </select>
          <button style={BP} onClick={onAdd}>追加</button>
        </div>
      </div>

      <div style={CARD}>
        <div style={{ overflowX:"auto" }}>
          <table style={TBL}>
            <thead>
              <tr>{["","単会","タスク内容","期限","残り","優先","操作"].map(h => <th key={h} style={TH}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {visible.map(t => {
                const ch = getChapter(t.chapterId);
                const dl = Math.ceil((new Date(t.dueDate) - today) / 86400000);
                const p  = PRIO[t.priority] || PRIO.medium;
                return (
                  <tr key={t.id} className="hover-row" style={{ opacity: t.done ? .5 : 1, background: t.done ? "#FAFAFA" : "white" }}>
                    <td style={TD}><input type="checkbox" checked={t.done} onChange={() => onToggle(t.id)} style={{ cursor:"pointer" }} /></td>
                    <td style={TD}><span style={PILL(ch)}>{ch.name}</span></td>
                    <td style={{ ...TD, fontWeight: t.done ? 400 : 600, textDecoration: t.done ? "line-through" : "none", maxWidth:200 }}>{t.title}</td>
                    <td style={{ ...TD, fontSize:11 }}>{t.dueDate}</td>
                    <td style={TD}><span style={{ fontWeight:700, fontSize:11, color: t.done ? "#90A4AE" : dl < 0 ? "#B71C1C" : dl <= 3 ? "#E65100" : dl <= 7 ? "#FF8F00" : "#2E7D32" }}>{t.done ? "✓完了" : dl < 0 ? "超過" : `${dl}日`}</span></td>
                    <td style={TD}><span style={{ fontSize:9, padding:"2px 6px", borderRadius:4, background: p.bg, color: p.color, fontWeight:700 }}>{p.label}</span></td>
                    <td style={TD}>{!t.done && <button style={{ ...BSM, color:"#B71C1C", padding:"2px 7px" }} onClick={() => onDelete(t.id)}>×</button>}</td>
                  </tr>
                );
              })}
              {visible.length === 0 && <tr><td colSpan={7} style={{ ...TD, textAlign:"center", color:"#90A4AE", padding:22 }}>タスクなし</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── ランキング ────────────────────────────────────────────────────
function RankingView({ tasks, today }) {
  const months = [];
  for (let i = 0; i < 6; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    months.push({ value: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`, label: `${d.getFullYear()}年${d.getMonth()+1}月` });
  }
  const [selMonth, setSelMonth] = useState(months[0].value);

  // 選択月の完了タスクを抽出してスコア計算
  const ranking = CHAPTERS.map(ch => {
    const done = tasks.filter(t =>
      t.done && t.completedAt && t.chapterId === ch.id &&
      t.completedAt.startsWith(selMonth)
    );
    if (done.length === 0) return { ch, count:0, avgDays:null, scores:[] };

    const scores = done.map(t => {
      const due  = new Date(t.dueDate);
      const comp = new Date(t.completedAt);
      return Math.ceil((due - comp) / 86400000); // 正=早い、負=遅い
    });
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    return { ch, count: done.length, avgDays: avg, scores, done };
  }).sort((a, b) => {
    // 完了タスクなしは最下位
    if (a.avgDays === null && b.avgDays === null) return 0;
    if (a.avgDays === null) return 1;
    if (b.avgDays === null) return -1;
    return b.avgDays - a.avgDays;
  });

  const MEDALS = ["🥇","🥈","🥉","4位","5位"];
  const maxAbs = Math.max(...ranking.filter(r => r.avgDays !== null).map(r => Math.abs(r.avgDays)), 1);

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ fontSize:17, fontWeight:700, color:"#1A3A6B" }}>🏆 タスク完了ランキング</div>
        <select style={{ ...SEL, marginLeft:"auto" }} value={selMonth} onChange={e => setSelMonth(e.target.value)}>
          {months.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
        </select>
      </div>

      {/* ランキングカード */}
      <div style={{ display:"grid", gap:10, marginBottom:16 }}>
        {ranking.map((r, i) => {
          const isTop   = i === 0 && r.avgDays !== null;
          const noData  = r.avgDays === null;
          const isEarly = r.avgDays !== null && r.avgDays >= 0;
          const barW    = noData ? 0 : Math.round(Math.abs(r.avgDays) / maxAbs * 100);

          return (
            <div key={r.ch.id} style={{ ...CARD, marginBottom:0, border: isTop ? `2px solid ${r.ch.color}` : "2px solid transparent", position:"relative", overflow:"hidden" }}>
              {isTop && <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background: r.ch.color }} />}
              <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>

                {/* 順位 */}
                <div style={{ fontSize: i < 3 ? 28 : 18, minWidth:40, textAlign:"center", lineHeight:1 }}>
                  {noData ? "－" : MEDALS[i]}
                </div>

                {/* 単会名 */}
                <div style={{ minWidth:90 }}>
                  <div style={{ fontWeight:800, fontSize:13, color: r.ch.color }}>{r.ch.name}</div>
                  <div style={{ fontSize:10, color:"#90A4AE" }}>{r.ch.dayName}</div>
                </div>

                {/* バーグラフ */}
                <div style={{ flex:1, minWidth:160 }}>
                  {noData ? (
                    <div style={{ fontSize:11, color:"#B0BEC5" }}>完了タスクなし</div>
                  ) : (
                    <div>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
                        <span style={{ fontSize:20, fontWeight:800, color: isEarly ? "#1B5E20" : "#B71C1C" }}>
                          {isEarly ? "+" : ""}{r.avgDays.toFixed(1)}
                        </span>
                        <span style={{ fontSize:11, color:"#78909C" }}>日（平均）</span>
                        <span style={{ fontSize:11, color:"#546E7A", marginLeft:4 }}>
                          {isEarly ? "⬆ 期限より早い" : "⬇ 期限より遅い"}
                        </span>
                      </div>
                      <div style={{ background:"#ECEFF1", borderRadius:4, height:10, overflow:"hidden" }}>
                        <div style={{
                          height:"100%", borderRadius:4,
                          width: `${barW}%`,
                          background: isEarly
                            ? `linear-gradient(90deg, ${r.ch.color}, ${r.ch.accent})`
                            : "linear-gradient(90deg, #EF5350, #FFCDD2)",
                          transition:"width .4s"
                        }} />
                      </div>
                    </div>
                  )}
                </div>

                {/* 完了件数 */}
                <div style={{ textAlign:"center", minWidth:60 }}>
                  <div style={{ fontSize:22, fontWeight:800, color: r.ch.color }}>{r.count}</div>
                  <div style={{ fontSize:10, color:"#90A4AE" }}>件完了</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* タスク詳細 */}
      <div style={{ fontSize:13, fontWeight:700, color:"#37474F", marginBottom:7 }}>完了タスク詳細（{months.find(m => m.value === selMonth)?.label}）</div>
      <div style={CARD}>
        <div style={{ overflowX:"auto" }}>
          <table style={TBL}>
            <thead>
              <tr>{["単会","タスク内容","期限","完了日時","早/遅"].map(h => <th key={h} style={TH}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {tasks
                .filter(t => t.done && t.completedAt && t.completedAt.startsWith(selMonth))
                .sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt))
                .map(t => {
                  const ch   = getChapter(t.chapterId);
                  const days = Math.ceil((new Date(t.dueDate) - new Date(t.completedAt)) / 86400000);
                  const comp = new Date(t.completedAt);
                  const compStr = `${comp.getMonth()+1}/${comp.getDate()} ${String(comp.getHours()).padStart(2,"0")}:${String(comp.getMinutes()).padStart(2,"0")}`;
                  return (
                    <tr key={t.id} className="hover-row">
                      <td style={TD}><span style={PILL(ch)}>{ch.name}</span></td>
                      <td style={{ ...TD, maxWidth:200 }}>{t.title}</td>
                      <td style={{ ...TD, fontSize:11 }}>{t.dueDate}</td>
                      <td style={{ ...TD, fontSize:11 }}>{compStr}</td>
                      <td style={TD}>
                        <span style={{ fontWeight:700, fontSize:12, color: days >= 0 ? "#1B5E20" : "#B71C1C" }}>
                          {days >= 0 ? `+${days}日早` : `${Math.abs(days)}日遅`}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              {tasks.filter(t => t.done && t.completedAt && t.completedAt.startsWith(selMonth)).length === 0 && (
                <tr><td colSpan={5} style={{ ...TD, textAlign:"center", color:"#90A4AE", padding:22 }}>この月の完了タスクなし</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{ padding:"8px 12px", background:"#E3F2FD", borderRadius:6, fontSize:11, color:"#1565C0" }}>
        💡 タスク管理タブでチェックを入れると自動でタイムスタンプが記録され、ランキングに反映されます
      </div>
    </div>
  );
}

// ── 講師タスクカード ──────────────────────────────────────────────
const TASK_CATEGORY_COLOR = {
  "依頼": "#1A3A6B",
  "宿泊": "#37474F",
  "資料": "#2E7D32",
  "当日": "#BF360C",
  "講話後": "#546E7A",
};

function SpeakerTasksView({ speakers, today, updateSpeaker, showToast }) {
  const [filterCh,   setFilterCh]   = useState("all");
  const [filterDone, setFilterDone] = useState("undone"); // all / undone / done
  const [expandedId, setExpandedId] = useState(null);

  const filtered = speakers
    .filter(sp => sp.status !== "cancelled")
    .filter(sp => filterCh === "all" || sp.chapterId === filterCh)
    .sort((a, b) => (a.seminarDate || "").localeCompare(b.seminarDate || ""));

  const toggleTask = (sp, taskId) => {
    const checks = { ...(sp.speakerChecks || {}) };
    checks[taskId] = !checks[taskId];
    updateSpeaker(sp.id, { speakerChecks: checks });
    showToast(checks[taskId] ? "✓ 完了にしました" : "未完了に戻しました");
  };

  const getProgress = sp => {
    const tasks = buildSpeakerTasks(sp);
    const checks = sp.speakerChecks || {};
    const done = tasks.filter(t => checks[t.id]).length;
    return { done, total: tasks.length, pct: tasks.length ? Math.round(done / tasks.length * 100) : 0 };
  };

  return (
    <div>
      {/* ヘッダー */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ fontSize:17, fontWeight:700, color:"#1A3A6B" }}>☑ 講師タスク管理</div>
        <select style={SEL} value={filterCh} onChange={e => setFilterCh(e.target.value)}>
          <option value="all">全単会</option>
          {CHAPTERS.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <div style={{ display:"flex", gap:4 }}>
          {[["undone","未完了のみ"],["all","すべて"],["done","完了のみ"]].map(([v,l]) => (
            <button key={v} style={{ ...( filterDone===v ? BP : BC ), padding:"5px 12px", fontSize:11 }} onClick={() => setFilterDone(v)}>{l}</button>
          ))}
        </div>
      </div>

      {/* カード一覧 */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(340px, 1fr))", gap:14 }}>
        {filtered.map(sp => {
          const ch = getChapter(sp.chapterId);
          const tasks = buildSpeakerTasks(sp);
          const checks = sp.speakerChecks || {};
          const prog = getProgress(sp);
          const allDone = prog.done === prog.total;
          const isExpanded = expandedId === sp.id;

          // フィルター適用
          if (filterDone === "done"   && !allDone) return null;
          if (filterDone === "undone" && allDone)  return null;

          // カテゴリ別にグループ化
          const byCategory = {};
          tasks.forEach(t => {
            if (!byCategory[t.category]) byCategory[t.category] = [];
            byCategory[t.category].push(t);
          });

          return (
            <div key={sp.id} style={{ ...CARD, borderTop:`4px solid ${ch?.color || "#1A3A6B"}`, opacity: allDone ? 0.7 : 1 }}>
              {/* カードヘッダー */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                <div>
                  <span style={PILL(ch)}>{ch?.name}</span>
                  <span style={{ fontSize:10, color:"#90A4AE", marginLeft:6 }}>{sp.seminarDate}</span>
                  {allDone && <span style={{ fontSize:10, background:"#E8F5E9", color:"#2E7D32", fontWeight:700, padding:"2px 7px", borderRadius:10, marginLeft:6 }}>✓ 完了</span>}
                </div>
                <button style={{ background:"none", border:"none", cursor:"pointer", fontSize:16, color:"#90A4AE" }} onClick={() => setExpandedId(isExpanded ? null : sp.id)}>
                  {isExpanded ? "▲" : "▼"}
                </button>
              </div>
              <div style={{ fontWeight:700, fontSize:13, marginBottom:2 }}>{sp.speakerName} 様</div>
              <div style={{ fontSize:11, color:"#78909C", marginBottom:8 }}>{sp.company}　{sp.role}</div>

              {/* プログレスバー */}
              <div style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#78909C", marginBottom:3 }}>
                  <span>{prog.done} / {prog.total} 完了</span>
                  <span style={{ fontWeight:700, color: allDone ? "#2E7D32" : "#1A3A6B" }}>{prog.pct}%</span>
                </div>
                <div style={{ background:"#E0E0E0", borderRadius:4, height:6 }}>
                  <div style={{ width:`${prog.pct}%`, background: allDone ? "#2E7D32" : "#1A3A6B", borderRadius:4, height:6, transition:"width .3s" }} />
                </div>
              </div>

              {/* タスクリスト（展開時は全表示、通常は未完了のみ） */}
              {Object.entries(byCategory).map(([cat, catTasks]) => {
                const visibleTasks = isExpanded ? catTasks : catTasks.filter(t => !checks[t.id]);
                if (visibleTasks.length === 0) return null;
                return (
                  <div key={cat} style={{ marginBottom:8 }}>
                    <div style={{ fontSize:10, fontWeight:700, color: TASK_CATEGORY_COLOR[cat] || "#546E7A", marginBottom:4, letterSpacing:"0.05em" }}>
                      ▸ {cat}
                    </div>
                    {visibleTasks.map(t => (
                      <label key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 6px", borderRadius:5, cursor:"pointer", background: checks[t.id] ? "#F1F8E9" : "#FAFAFA", marginBottom:3, border:`1px solid ${checks[t.id] ? "#C5E1A5" : "#EEEEEE"}` }}>
                        <input type="checkbox" checked={!!checks[t.id]} onChange={() => toggleTask(sp, t.id)} style={{ width:15, height:15, cursor:"pointer", accentColor: TASK_CATEGORY_COLOR[cat] }} />
                        <span style={{ fontSize:12, color: checks[t.id] ? "#78909C" : "#263238", textDecoration: checks[t.id] ? "line-through" : "none" }}>{t.label}</span>
                      </label>
                    ))}
                  </div>
                );
              })}

              {!isExpanded && prog.done > 0 && (
                <div style={{ fontSize:11, color:"#90A4AE", textAlign:"center", marginTop:4 }}>
                  ✓ 完了済み {prog.done}件を非表示 <span style={{ cursor:"pointer", color:"#1565C0" }} onClick={() => setExpandedId(sp.id)}>すべて見る</span>
                </div>
              )}

              {/* 講話後メモ表示 */}
              {(sp.postNotes || sp.drinksAlcohol || sp.lectureRating) && (
                <div style={{ marginTop:10, padding:"8px 10px", background:"#F8F9FA", borderRadius:6, borderLeft:"3px solid #78909C" }}>
                  <div style={{ fontSize:11, fontWeight:700, color:"#546E7A", marginBottom:4 }}>📝 講話後メモ</div>
                  {sp.drinksAlcohol && <div style={{ fontSize:11, color:"#546E7A" }}>お酒：{sp.drinksAlcohol}</div>}
                  {sp.lectureRating && <div style={{ fontSize:11, color:"#546E7A" }}>評価：{sp.lectureRating}</div>}
                  {sp.postNotes && <div style={{ fontSize:11, color:"#263238", marginTop:4, whiteSpace:"pre-wrap" }}>{sp.postNotes}</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {filtered.filter(sp => {
        const allDone = getProgress(sp).done === getProgress(sp).total;
        if (filterDone === "done"   && !allDone) return false;
        if (filterDone === "undone" && allDone)  return false;
        return true;
      }).length === 0 && (
        <div style={{ ...CARD, textAlign:"center", color:"#90A4AE", padding:40 }}>
          該当する講師タスクがありません
        </div>
      )}
    </div>
  );
}

// ── チラシ管理 ────────────────────────────────────────────────────
function FlyerView({ speakers, today, updateSpeaker, showToast }) {
  // 対象月（デフォルト：来月）
  const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);
  const months = Array.from({ length: 6 }, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
    return { value: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`, label: `${d.getFullYear()}年${d.getMonth()+1}月号` };
  });
  const [selMonth, setSelMonth] = useState(months[1].value); // デフォルト来月
  const [printEmail, setPrintEmail] = useState(""); // 印刷会社メールアドレス
  const [showEmailModal, setShowEmailModal] = useState(false);

  // 締め切り計算（毎月10日）
  const [year, month] = selMonth.split("-").map(Number);
  const deadline = new Date(year, month - 1, 10);
  const daysLeft = Math.ceil((deadline - today) / 86400000);
  const deadlineColor = daysLeft < 0 ? "#B71C1C" : daysLeft <= 3 ? "#E65100" : daysLeft <= 7 ? "#FF8F00" : "#2E7D32";

  // 選択月のMS講師データを単会ごとに取得
  const flyerData = CHAPTERS.map(ch => {
    const sp = speakers.find(s =>
      s.seminarType === "ms" &&
      s.chapterId === ch.id &&
      s.seminarDate &&
      s.seminarDate.startsWith(selMonth)
    );
    return { ch, sp };
  });

  // 流し込みデータの完成度チェック
  const readyCount = flyerData.filter(({ sp }) =>
    sp && sp.speakerName && sp.topic && sp.materialUrl
  ).length;

  // LINE共有テキスト生成
  const buildLineText = () => {
    const lines = [
      `【${selMonth.replace("-","年")}月号　チラシ流し込みデータ】`,
      `締め切り：${year}年${month}月10日`,
      ``,
    ];
    flyerData.forEach(({ ch, sp }) => {
      lines.push(`■ ${ch.name}（${ch.dayName}）`);
      if (sp) {
        lines.push(`  開催日：${sp.seminarDate}`);
        lines.push(`  講師：${sp.speakerName}　${sp.company}　${sp.role}`);
        lines.push(`  テーマ：「${sp.topic}」`);
        lines.push(`  写真：${sp.materialUrl || "※未受領"}`);
      } else {
        lines.push(`  ※講師未登録`);
      }
      lines.push(``);
    });
    lines.push(`倫理法人会 南部地区合同事務局`);
    return lines.join("\n");
  };

  // 印刷会社メール本文生成
  const buildEmailBody = () => {
    const lines = [
      `お世話になっております。`,
      `倫理法人会 南部地区合同事務局です。`,
      ``,
      `${selMonth.replace("-","年")}月号の合同チラシ用データをお送りします。`,
      ``,
      `【流し込みデータ一覧】`,
    ];
    flyerData.forEach(({ ch, sp }) => {
      lines.push(`▼ ${ch.name}単会（${ch.dayName} ${ch.time}）`);
      if (sp) {
        lines.push(`  開催日：${sp.seminarDate}`);
        lines.push(`  講師名：${sp.speakerName}`);
        lines.push(`  ふりがな：${sp.speakerKana || "―"}`);
        lines.push(`  所属単会：${sp.speakerUnit || "―"}`);
        lines.push(`  企業名：${sp.company}`);
        lines.push(`  役職・役目：${sp.role}`);
        lines.push(`  テーマ：「${sp.topic}」`);
        lines.push(`  顔写真：${sp.materialUrl || "※別途メール添付"}`);
      } else {
        lines.push(`  ※後日送付`);
      }
      lines.push(``);
    });
    lines.push(`ご不明点がございましたらご連絡ください。`);
    lines.push(`どうぞよろしくお願いいたします。`);
    lines.push(``);
    lines.push(`━━━━━━━━━━━━━━━`);
    lines.push(`倫理法人会 南部地区合同事務局`);
    lines.push(`Mail：${JIMU.email}`);
    lines.push(`━━━━━━━━━━━━━━━`);
    return lines.join("\n");
  };

  const emailSubject = `【倫理法人会南部地区】${selMonth.replace("-","年")}月号チラシ流し込みデータ送付`;

  return (
    <div>
      {/* ヘッダー */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ fontSize:17, fontWeight:700, color:"#1A3A6B" }}>📋 チラシ流し込みデータ管理</div>
        <select style={{ ...SEL, fontWeight:700 }} value={selMonth} onChange={e => setSelMonth(e.target.value)}>
          {months.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
        </select>
        <div style={{ marginLeft:"auto", display:"flex", gap:8, flexWrap:"wrap" }}>
          <button style={BP} onClick={() => {
            navigator.clipboard?.writeText(buildLineText()).catch(() => {});
            showToast("LINEテキストをコピーしました！グループに貼り付けてください 📱");
          }}>📱 LINE共有テキストをコピー</button>
          <button style={{ ...BP, background:"#1B5E20" }} onClick={() => setShowEmailModal(true)}>📧 印刷会社にメール送信</button>
        </div>
      </div>

      {/* 締め切りバナー */}
      <div style={{ ...CARD, marginBottom:12, borderLeft:`5px solid ${deadlineColor}`, padding:"10px 16px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:16, flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:11, color:"#546E7A" }}>データ送付締め切り</div>
            <div style={{ fontSize:16, fontWeight:800, color: deadlineColor }}>
              {year}年{month}月10日
              <span style={{ fontSize:13, marginLeft:10 }}>
                {daysLeft < 0 ? `⚠ ${Math.abs(daysLeft)}日超過` : daysLeft === 0 ? "⚠ 本日締め切り！" : `残り ${daysLeft}日`}
              </span>
            </div>
          </div>
          <div style={{ marginLeft:"auto", textAlign:"center" }}>
            <div style={{ fontSize:24, fontWeight:800, color: readyCount === 5 ? "#1B5E20" : "#E65100" }}>{readyCount}<span style={{ fontSize:13, fontWeight:400 }}>/5単会</span></div>
            <div style={{ fontSize:11, color:"#78909C" }}>データ揃い</div>
          </div>
        </div>
      </div>

      {/* 流し込みデータ一覧 */}
      <div style={CARD}>
        <div style={{ overflowX:"auto" }}>
        <table style={TBL}>
          <thead>
            <tr>
              {["単会名","開催日","講師名（漢字）","ふりがな","所属単会","企業名","役職・役目","テーマ","顔写真","状態"].map(h =>
                <th key={h} style={TH}>{h}</th>
              )}
            </tr>
          </thead>
          <tbody>
            {flyerData.map(({ ch, sp }) => {
              const ready = sp && sp.speakerName && sp.speakerKana && sp.topic && sp.materialUrl;
              const partial = sp && (sp.speakerName || sp.topic) && !ready;
              const statusColor = ready ? "#2E7D32" : partial ? "#FF8F00" : "#B71C1C";
              const statusBg    = ready ? "#E8F5E9" : partial ? "#FFF8E1" : "#FFEBEE";
              const statusLabel = ready ? "✓ 完成" : partial ? "▲ 不足あり" : "✗ 未登録";
              const none = <span style={{ color:"#B0BEC5" }}>―</span>;
              return (
                <tr key={ch.id} className="hover-row">
                  <td style={TD}><span style={PILL(ch)}>{ch.name}</span><div style={{ fontSize:10, color:"#90A4AE", marginTop:2 }}>{ch.dayName}</div></td>
                  <td style={{ ...TD, fontSize:12, whiteSpace:"nowrap" }}>{sp?.seminarDate || none}</td>
                  <td style={{ ...TD, fontWeight:700, fontSize:12, whiteSpace:"nowrap" }}>{sp?.speakerName || <span style={{ color:"#B71C1C" }}>未登録</span>}</td>
                  <td style={{ ...TD, fontSize:11, color:"#546E7A" }}>{sp?.speakerKana || none}</td>
                  <td style={{ ...TD, fontSize:11 }}>{sp?.speakerUnit || none}</td>
                  <td style={{ ...TD, fontSize:11 }}>{sp?.company || none}</td>
                  <td style={{ ...TD, fontSize:11 }}>{sp?.role || none}</td>
                  <td style={{ ...TD, fontSize:11, maxWidth:160 }}>{sp?.topic ? `「${sp.topic}」` : none}</td>

                        <span>📁</span>フォルダを開く
                      </a>
                    ) : <span style={{ fontSize:11, color:"#B0BEC5" }}>📭 未設定</span>}

                  <td style={TD}>
                    <span style={{ fontSize:11, fontWeight:700, color:statusColor, background:statusBg, padding:"3px 8px", borderRadius:4, whiteSpace:"nowrap" }}>{statusLabel}</span>

                </tr>
              );
            })}

        </table>
        </div>
      </div>

      {/* 注意書き */}
      <div style={{ padding:"10px 14px", background:"#FFF8E1", borderRadius:6, fontSize:11, color:"#E65100", display:"flex", gap:8, alignItems:"flex-start" }}>

        </div>

      {/* 印刷会社メールモーダル */}
      {showEmailModal && (
        <div style={OV} onClick={() => setShowEmailModal(false)}>
          <div style={{ ...MOD, maxWidth:600 }} onClick={e => e.stopPropagation()}>
            <div style={MH}>📧 印刷会社へのメール送信</div>
            <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>印刷会社のメールアドレス</div>
            <input
              style={{ ...INP, width:"100%", marginBottom:12 }}
              placeholder="print@example.com"
              value={printEmail}
              onChange={e => setPrintEmail(e.target.value)}
            />
            <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>件名</div>
            <div style={{ fontSize:12, background:"#F5F5F5", padding:"7px 11px", borderRadius:6, marginBottom:10 }}>{emailSubject}</div>
            <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>本文プレビュー</div>
            <pre style={{ background:"#F5F5F5", borderRadius:8, padding:12, fontSize:11, lineHeight:1.8, whiteSpace:"pre-wrap", maxHeight:280, overflowY:"auto", marginBottom:12 }}>{buildEmailBody()}</pre>
            <div style={{ display:"flex", gap:8 }}>

                window.open(`mailto:${printEmail}?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(buildEmailBody())}`, "_blank");

                showToast("メールアプリを開きました 📧");
              }}>✉ メールアプリで開く</button>
              <button style={{ ...BG, flex:1 }} onClick={() => {
                navigator.clipboard?.writeText(`件名：${emailSubject}\n\n${buildEmailBody()}`).catch(() => {});

                showToast("メール文をコピーしました 📋");
              }}>📋 コピーして送信</button>
              <button style={BC} onClick={() => setShowEmailModal(false)}>閉じる</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

            { l:"電話",        k:"phone",       t:"text",  p:"090-0000-0000" },
            { l:"ステータス",  k:"status",      t:"select", o: Object.entries(STATUS).map(([k, v]) => ({ v:k, l:v.label })) },
            { l:"依頼日",      k:"requestDate", t:"date" },
          ].map(({ l, k, t, p, o }) => (
            <div key={k}>
              <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>{l}</div>
              {t === "select" ? (
                <select style={{ ...INP, width:"100%" }} value={form[k] || ""} onChange={e => set(k, e.target.value)}>
                  {o.map(x => <option key={x.v} value={x.v}>{x.l}</option>)}
                </select>
              ) : (
                <input type={t} style={{ ...INP, width:"100%" }} placeholder={p} value={form[k] || ""} onChange={e => set(k, e.target.value)} />
              )}
            </div>
          ))}
          {/* 会場：MS固定表示、その他手入力 */}
          <div style={{ gridColumn:"1/-1" }}>
            <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>
              開催場所
              {st.venueFixed && <span style={{ fontSize:10, color:"#90A4AE", marginLeft:6 }}>※ 単会マスターから自動取得</span>}
            </div>
            {st.venueFixed ? (
              <div style={{ ...INP, background:"#F5F5F5", color:"#90A4AE", cursor:"not-allowed", display:"flex", alignItems:"center" }}>
                {ch.venue}
              </div>
            ) : (
              <input type="text" style={{ ...INP, width:"100%" }} placeholder="会場名を入力" value={form.venue || ""} onChange={e => set("venue", e.target.value)} />
            )}
          </div>
          <div style={{ gridColumn:"1/-1" }}>
            <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>テーマ</div>
            <input type="text" style={{ ...INP, width:"100%" }} placeholder="セミナーテーマ" value={form.topic || ""} onChange={e => set("topic", e.target.value)} />
          </div>
          <div style={{ gridColumn:"1/-1" }}>
            <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>備考</div>
            <textarea style={{ ...INP, width:"100%", minHeight:54, resize:"vertical" }} value={form.notes || ""} onChange={e => set("notes", e.target.value)} />
          </div>

          {/* 講話後メモ欄 */}
          <div style={{ gridColumn:"1/-1", borderTop:"2px dashed #E0E0E0", paddingTop:12, marginTop:4 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#546E7A", marginBottom:8 }}>📝 講話後メモ（終了後に記入）</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div>
                <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>お酒を飲むか</div>
                <select style={{ ...INP, width:"100%" }} value={form.drinksAlcohol || ""} onChange={e => set("drinksAlcohol", e.target.value)}>
                  <option value="">未確認</option>
                  <option value="飲む">飲む</option>
                  <option value="飲まない">飲まない</option>
                  <option value="少量なら">少量なら</option>
                </select>
              </div>
              <div>
                <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>講話の評価</div>
                <select style={{ ...INP, width:"100%" }} value={form.lectureRating || ""} onChange={e => set("lectureRating", e.target.value)}>
                  <option value="">未記入</option>
                  <option value="★★★★★">★★★★★ 素晴らしい</option>
                  <option value="★★★★">★★★★ 良かった</option>
                  <option value="★★★">★★★ 普通</option>
                  <option value="★★">★★ 要改善</option>
                </select>
              </div>
              <div style={{ gridColumn:"1/-1" }}>
                <div style={{ fontSize:11, color:"#78909C", marginBottom:3, fontWeight:600 }}>講話内容・特記事項・次回への申し送り</div>
                <textarea style={{ ...INP, width:"100%", minHeight:80, resize:"vertical" }} placeholder="講話の内容、参加者の反応、次回依頼時の注意点など自由に記入" value={form.postNotes || ""} onChange={e => set("postNotes", e.target.value)} />
              </div>
            </div>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, marginTop:14 }}>
          <button style={BP} onClick={() => { if (!form.speakerName || !form.seminarDate) return alert("講師名・開催日は必須です"); onSave(form); }}>
            {initial ? "💾 変更を保存" : "✓ 登録する"}
          </button>
          <button style={BC} onClick={onClose}>キャンセル</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
